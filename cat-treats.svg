"use client";

import Link from "next/link";
import { useEffect, useState } from "react";
import { getCart } from "@/lib/client-store";

const nav = [
  ["Shop", "/shop"],
  ["Build a Box", "/configure"],
  ["Journal", "/journal"],
  ["About", "/about"],
  ["Contact", "/contact"],
  ["Account", "/account"]
] as const;

export default function Header() {
  const [open, setOpen] = useState(false);
  const [count, setCount] = useState(0);

  useEffect(() => {
    const refresh = () => {
      const total = getCart().reduce((sum, item) => sum + item.quantity, 0);
      setCount(total);
    };
    refresh();
    window.addEventListener("petbox-cart-changed", refresh);
    return () => window.removeEventListener("petbox-cart-changed", refresh);
  }, []);

  return (
    <header className="site-header">
      <div className="container header-row">
        <Link href="/" className="brand">
          <span className="brand-badge">🐾</span>
          <span>
            <strong>PetBox</strong>
            <small>Pet subscription box</small>
          </span>
        </Link>

        <nav className="desktop-nav" aria-label="Main navigation">
          {nav.map(([label, href]) => (
            <Link key={href} href={href} className="nav-link">{label}</Link>
          ))}
        </nav>

        <div className="header-actions">
          <Link href="/cart" className="cart-pill">Cart <span>{count}</span></Link>
          <button className="menu-btn" onClick={() => setOpen((v) => !v)} aria-label="Toggle menu" aria-expanded={open}>
            {open ? "✕" : "☰"}
          </button>
        </div>
      </div>

      {open ? (
        <div className="mobile-menu">
          <div className="container mobile-menu-inner">
            {nav.map(([label, href]) => (
              <Link key={href} href={href} onClick={() => setOpen(false)}>{label}</Link>
            ))}
            <Link href="/cart" onClick={() => setOpen(false)}>Cart ({count})</Link>
          </div>
        </div>
      ) : null}
    </header>
  );
}
